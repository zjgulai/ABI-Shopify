# 方案B 配套:把此 server 块加入你现有 nginx(/etc/nginx/conf.d/),证书用 certbot 单独申请。
server {
    server_name platform.shopify.lute-tlz-dddd.top;
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    listen 80;
    # HTTPS: 运行  sudo certbot --nginx -d platform.shopify.lute-tlz-dddd.top
}
