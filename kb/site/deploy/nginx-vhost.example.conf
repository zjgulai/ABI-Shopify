# 方案B 配套:把此 server 块加入现有共享 nginx;shopifykb-app 需加入 nginx 所在 Docker 网络。
server {
    server_name platform.shopify.lute-tlz-dddd.top;
    location / {
        proxy_pass http://shopifykb-app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    listen 80;
    # HTTPS: 运行  sudo certbot --nginx -d platform.shopify.lute-tlz-dddd.top
}
