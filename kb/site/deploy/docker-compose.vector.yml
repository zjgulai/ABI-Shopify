# 方案 C:生产检索后端。显式追加本文件时才启用 bge/Chroma/Neo4j。
# 用法:
#   docker compose -f docker-compose.yml -f docker-compose.behind-proxy.yml -f docker-compose.vector.yml up -d --build
services:
  app:
    build:
      args:
        INSTALL_VECTOR_EXTRAS: "1"
        KB_EMBEDDER: ${SHOPIFY_KB_EMBEDDER:-st}
        KB_VECTOR_STORE: ${SHOPIFY_KB_VECTOR_STORE:-chroma}
        KB_ST_MODEL: ${SHOPIFY_KB_ST_MODEL:-BAAI/bge-m3}
        HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
    environment:
      KB_EMBEDDER: ${SHOPIFY_KB_EMBEDDER:-st}
      KB_VECTOR_STORE: ${SHOPIFY_KB_VECTOR_STORE:-chroma}
      KB_ST_MODEL: ${SHOPIFY_KB_ST_MODEL:-BAAI/bge-m3}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HOME: /root/.cache/huggingface
      KB_RUNTIME_BUILD_ON_START: ${SHOPIFY_KB_RUNTIME_BUILD_ON_START:-1}
      KB_RUNTIME_BUILD_REQUIRED: ${SHOPIFY_KB_RUNTIME_BUILD_REQUIRED:-0}
      KB_GRAPH_BACKEND: neo4j
      KB_GRAPH_IMPORT_ON_START: "1"
      NEO4J_URI: bolt://shopifykb-neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      NEO4J_WAIT_SECONDS: "120"
    volumes:
      - kb_hf_cache:/root/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    container_name: shopifykb-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?set NEO4J_PASSWORD in .env}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
      NEO4J_server_memory_pagecache_size: 512m
      NEO4J_dbms_security_procedures_unrestricted: ""
      NEO4J_PLUGINS: "[]"
    expose:
      - "7474"
      - "7687"
    volumes:
      - kb_neo4j_data:/data
      - kb_neo4j_logs:/logs
    networks: [kbnet]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_PASSWORD}\" 'RETURN 1' >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 20

volumes:
  kb_neo4j_data: { name: shopify-kb-neo4j-data }
  kb_neo4j_logs: { name: shopify-kb-neo4j-logs }
  kb_hf_cache: { name: shopify-kb-hf-cache }
